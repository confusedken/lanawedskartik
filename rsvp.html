    <div class="subpage-title">
      <h1>RSVP</h1>
      <p class="subpage-script">We would love to celebrate with you</p>
    </div>
  </section>

  <main class="rsvp-page">

    <div class="rsvp-intro reveal">
      <div class="section-ornament"><img src="welcome_bar.png" alt=""></div>
      <p>Please let us know if you can make it. We can't wait to celebrate with you!</p>
    </div>

    <div class="rsvp-container reveal">

      <form class="rsvp-form" id="rsvpForm" onsubmit="submitRSVP(event)">

        <!-- Name -->
        <div class="rsvp-field">
          <label for="rsvp-name">Your Full Name</label>
          <input type="text" id="rsvp-name" name="name" placeholder="e.g. Priya Sharma" required>
        </div>

        <!-- Event -->
        <div class="rsvp-field" id="rsvpEventsField">
          <label>Which events will you be attending?</label>
          <div class="rsvp-checkboxes" id="rsvpEventsCheckboxes">
            <label class="check-item"><input type="checkbox" name="events" value="Wedding Ceremony"> Wedding Ceremony (Hyderabad) <span class="check-date">27 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Reception"> Reception (Nagpur) <span class="check-date">2 Sep</span></label>
          </div>
        </div>

        <!-- Attending -->
        <div class="rsvp-field">
          <label>Your Response</label>
          <div class="rsvp-radio-group">
            <label class="radio-card yes-card">
              <input type="radio" name="attending" value="yes" required>
              <span class="radio-icon">🎉</span>
              <span class="radio-label">Joyfully Joining</span>
              <span class="radio-sub">We will be there!</span>
            </label>
            <label class="radio-card no-card">
              <input type="radio" name="attending" value="no">
              <span class="radio-icon">💌</span>
              <span class="radio-label">Regretfully Declining</span>
              <span class="radio-sub">Sending love from afar</span>
            </label>
          </div>
        </div>

        <!-- Guest count -->
        <div class="rsvp-field" id="rsvpGuestsField">
          <label for="rsvp-guests">Number of guests (including yourself)</label>
          <div class="rsvp-counter" id="rsvpGuestsCounter">
            <button type="button" onclick="changeGuests(-1)">&#8722;</button>
            <span id="guestCount">1</span>
            <button type="button" onclick="changeGuests(1)">&#43;</button>
          </div>
          <input type="hidden" id="rsvp-guests-value" name="guests" value="1">
        </div>

        <!-- Message -->
        <div class="rsvp-field">
          <label for="rsvp-message">Leave a message for Lalana &amp; Kartik <span class="optional">(optional)</span></label>
          <textarea id="rsvp-message" name="message" rows="4" placeholder="Write your wishes here…"></textarea>
        </div>

        <p class="rsvp-error" id="rsvpError" style="display:none;" role="alert"></p>

        <button type="submit" class="rsvp-submit">Send RSVP &#10003;</button>

      </form>

      <!-- Success state -->
      <div class="rsvp-success" id="rsvpSuccess" style="display:none;">
        <div class="success-ornament"><img src="welcome_bar.png" alt=""></div>
        <p class="success-script">Thank you!</p>
        <p class="success-body">Your RSVP has been received.</p>
        <p class="success-names">— Lalana &amp; Kartik 💛</p>
      </div>

    </div>
