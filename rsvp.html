<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSVP | Lalana & Kartik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="site">

  <div id="site-nav-mount"></div>
  <div id="page-content">

  <section class="page-hero subpage">
    <div class="subpage-title">
      <h1>RSVP</h1>
      <p class="subpage-script">We would love to celebrate with you</p>
    </div>
  </section>

  <main class="rsvp-page">

    <div class="rsvp-intro reveal">
      <div class="section-ornament"><img src="welcome_bar.png" alt=""></div>
      <p>Please let us know if you can make it. Fill in the form below and we will get back to you with event details closer to the date.</p>
    </div>

    <div class="rsvp-container reveal">

      <form class="rsvp-form" id="rsvpForm" onsubmit="submitRSVP(event)">

        <!-- Name -->
        <div class="rsvp-field">
          <label for="rsvp-name">Your Full Name</label>
          <input type="text" id="rsvp-name" name="name" placeholder="e.g. Priya Sharma" required>
        </div>

        <!-- Event -->
        <div class="rsvp-field">
          <label>Which events will you be attending?</label>
          <div class="rsvp-checkboxes">
            <label class="check-item"><input type="checkbox" name="events" value="Mehendi"> Mehendi <span class="check-date">25 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Pellikuthuru"> Pellikuthuru <span class="check-date">26 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Pellikoduku"> Pellikoduku <span class="check-date">26 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Upanayanam"> Upanayanam <span class="check-date">26 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Sangeeth"> Sangeeth <span class="check-date">26 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Gowri Pooja"> Gowri Pooja <span class="check-date">27 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Wedding Ceremony"> Wedding Ceremony <span class="check-date">27 Aug</span></label>
            <label class="check-item"><input type="checkbox" name="events" value="Reception"> Reception Nagpur <span class="check-date">2 Sep</span></label>
          </div>
        </div>

        <!-- Attending -->
        <div class="rsvp-field">
          <label>Your Response</label>
          <div class="rsvp-radio-group">
            <label class="radio-card yes-card">
              <input type="radio" name="attending" value="yes" required>
              <span class="radio-icon">🎉</span>
              <span class="radio-label">Joyfully Joining</span>
              <span class="radio-sub">We will be there!</span>
            </label>
            <label class="radio-card no-card">
              <input type="radio" name="attending" value="no">
              <span class="radio-icon">💌</span>
              <span class="radio-label">Sadly Regret</span>
              <span class="radio-sub">Sending love from afar</span>
            </label>
          </div>
        </div>

        <!-- Guest count -->
        <div class="rsvp-field">
          <label for="rsvp-guests">Number of guests (including yourself)</label>
          <div class="rsvp-counter">
            <button type="button" onclick="changeGuests(-1)">&#8722;</button>
            <span id="guestCount">1</span>
            <button type="button" onclick="changeGuests(1)">&#43;</button>
          </div>
          <input type="hidden" id="rsvp-guests-value" name="guests" value="1">
        </div>

        <!-- Message -->
        <div class="rsvp-field">
          <label for="rsvp-message">Leave a message for Lalana &amp; Kartik <span class="optional">(optional)</span></label>
          <textarea id="rsvp-message" name="message" rows="4" placeholder="Write your wishes here…"></textarea>
        </div>

        <button type="submit" class="rsvp-submit">Send RSVP &#10003;</button>

      </form>

      <!-- Success state -->
      <div class="rsvp-success" id="rsvpSuccess" style="display:none;">
        <div class="success-ornament"><img src="welcome_bar.png" alt=""></div>
        <p class="success-script">Thank you!</p>
        <p class="success-body">Your RSVP has been received. We can't wait to celebrate with you!</p>
        <p class="success-names">— Lalana &amp; Kartik 💛</p>
      </div>

    </div>

  </main>

  </div>

  <div id="site-footer-mount"></div>
</div>

<script src="script.js"></script>
</body>
</html>
