<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lalana & Kartik Wedding</title>

  <script>
    // If arriving via a "Home" nav link (index.html#main), skip the splash
    // instantly so Home always lands on the welcome page, not the video.
    if (window.location.hash === "#main") {
      document.documentElement.classList.add("skip-splash");
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&family=Noto+Serif+Telugu:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ============ SOUND PERMISSION MODAL ============ -->
<div class="sound-modal" id="soundModal">
  <div class="sound-modal-box">
    <div class="sound-modal-icon">🎵</div>
    <h2>Experience with Sound?</h2>
    <p>This invitation includes a sacred audio experience. Would you like to enable sound?</p>
    <div class="sound-modal-btns">
      <button class="sound-btn sound-btn-yes" id="soundYes">Yes, please</button>
      <button class="sound-btn sound-btn-no" id="soundNo">No thanks</button>
    </div>
  </div>
</div>

<!-- ============ SPLASH SCREEN ============ -->
<section class="splash" id="splash">
  <video id="heroVideo" class="bg-video" autoplay muted loop playsinline>
    <source src="ganapati-video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="splash-content">
    <div class="mantra-wrapper">
      <img src="om-ganapati.png" class="mantra-img" alt="Om Ganapataye Namah">
    </div>

    <button id="enterBtn" class="royal-image-btn">
      <img src="royal-button-frame-v2.png" alt="" class="button-frame-img"/>
      <span class="button-text">Enter Our Wedding</span>
    </button>
  </div>


</section>

<!-- ============ MAIN WELCOME SITE ============ -->
<div class="site welcome-active">

  <main class="home-screen" aria-label="Welcome">
    <img src="homepage.png" class="homepage-art" alt="Lalana and Kartik Wedding Welcome">

    <!-- Desktop: invisible hotspots over the nav bar in the image -->
    <nav class="desktop-hotspots" aria-label="Main navigation">
      <a class="hotspot hp-home"   href="index.html#main">Home</a>
      <a class="hotspot hp-story"  href="our-story.html">Our Story</a>
      <a class="hotspot hp-events" href="events.html">Events</a>
      <a class="hotspot hp-rsvp"   href="rsvp.html">RSVP</a>
      <a class="hotspot hp-gift"   href="gift-registry.html">Gift Registry</a>
    </nav>

    <!-- Mobile: floating bottom nav pill -->
    <nav class="mobile-home-nav" aria-label="Mobile navigation">
      <a href="index.html#main" class="active">Home</a>
      <a href="our-story.html">Our Story</a>
      <a href="events.html">Events</a>
      <a href="rsvp.html">RSVP</a>
      <a href="gift-registry.html">Gifts</a>
    </nav>
  </main>

  <!-- ============ MOBILE SINGLE-SCROLL PAGES ============ -->
  <div id="mobile-pages" class="mobile-only">
    <div class="mobile-page-section" data-src="events.html" data-label="Events"></div>
    <div class="mobile-page-section" data-src="our-story.html" data-label="Our Story"></div>
    <div class="mobile-page-section" data-src="rsvp.html" data-label="RSVP"></div>
    <div class="mobile-page-section" data-src="gift-registry.html" data-label="Gift Registry"></div>
  </div>

  <div id="site-footer-mount"></div>
</div>

<script src="script.js"></script>
</body>
</html>
